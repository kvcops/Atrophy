name: atrophy PR Report
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  atrophy-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install atrophy
        run: uv tool install atrophy

      - name: Run atrophy scan
        run: |
          atrophy init --email "${{ github.event.pull_request.user.login }}@users.noreply.github.com" --no-interactive
          atrophy scan --days 90
        env:
          ATROPHY_LLM_PROVIDER: none  # No LLM needed for reports

      - name: Generate JSON report
        run: atrophy report --json > /tmp/atrophy_report.json

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/atrophy_report.json', 'utf8'));
            const humanPct = Math.round(report.summary.human_ratio * 100);
            const deadZones = report.dead_zones.slice(0, 3).join(', ') || 'None';
            const body = [
              '## 🧬 atrophy Report',
              '',
              `| Metric | This PR author |`,
              `|--------|----------------|`,
              `| Human-written code | ${humanPct}% of recent commits |`,
              `| Dead zones | ${deadZones} |`,
              `| Streak | ${report.summary.streak} weeks |`,
              '',
              '<sub>atrophy helps developers track skill health in the AI era. ',
              '[Learn more](https://github.com/${{ github.repository_owner }}/atrophy)</sub>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
